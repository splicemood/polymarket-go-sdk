name: Go CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v -coverprofile=coverageout ./pkg/...

      - name: Check Coverage
        run: |
          go tool cover -func=coverageout | grep total | awk '{print substr($3, 1, length($3)-1)}' | awk '{if ($1 < 40.0) { print "Coverage is " $1 "%, which is below the 40% threshold"; exit 1 } else { print "Coverage is " $1 "%" }}'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Govulncheck (advisory)
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
